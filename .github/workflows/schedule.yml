name: High-Frequency Crypto Scalper Loop

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-scalper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6  # UPGRADED TO NODE 24 COMPLIANT

      - name: Set Up Python 3.10
        uses: actions/setup-python@v6  # UPGRADED TO NODE 24 COMPLIANT
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-py requests

      - name: Execute Self-Correcting Scalper Core
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python bot.py

      - name: Commit and Push Updated Memory Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_state.json trade_journal.json || true
          git commit -m "🧠 AI Core Sync: Updated active positions & historical feedback logs" || true
          git push
