name: Run AI Trading Bot

on:
  schedule:
    # 1. Sydney Open: 11:40 PM UTC (Sun-Thu to catch Sunday night week-opener)
    - cron: '40 23 * * 0-4'
    # 2. Tokyo Open: 12:10 AM UTC (Mon-Fri)
    - cron: '10 0 * * 1-5'
    # 3. London Open: 7:10 AM UTC (Mon-Fri)
    - cron: '10 7 * * 1-5'
    # 4. New York Open: 1:40 PM UTC (Mon-Fri)
    - cron: '40 13 * * 1-5'
  workflow_dispatch: # Keeps manual button active for testing
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests alpaca-py

      - name: Run trading script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python bot.py
